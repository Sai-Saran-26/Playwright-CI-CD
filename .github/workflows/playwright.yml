name: Playwright CI/CD            # pipeline name 

on:                               # when to trigger the pipeline 
  push:
    branches:
      - main                      # on push to main branch 

  pull_request:
    branches:
      - main                      # on pull request to main branch        

jobs:                             # actual tasks to be executed

  test:                           # test job

    runs-on: ubuntu-latest        # Fresh Ubuntu Linux virtual Machine for each Job 
    
    strategy:
      matrix:
        shardIndex: [1, 2, 3]       

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright Tests
        run: npx playwright test --shard=${{ matrix.shardIndex }}/3

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.shardIndex }}
          path: playwright-report/

  deploy:                          # deploy Job
    needs: test

    runs-on: ubuntu-latest         # Another Fresh Ubuntu Linux virtual Machine

    steps:

      - name: Deploy Application
        run: echo "Deploying app..."